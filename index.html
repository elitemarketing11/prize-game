<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prize Machine</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;min-height:100vh;background:#e8e8e8;display:flex;align-items:center;justify-content:center;padding:1.5rem 1rem;}
body{font-family:'Press Start 2P',monospace;}

.machine{max-width:400px;width:100%;margin:0 auto;}

.frame-outer{
  background:#FFF0A0;border-radius:20px;border:5px solid #555;
  box-shadow:inset 0 0 0 4px #FFFDE0,inset 0 0 0 8px #F5E070,inset 0 0 0 11px #555,7px 9px 0 5px #555;
  padding:12px 12px 0 12px;position:relative;
}
.frame-outer::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;border-radius:16px;
  background-image:radial-gradient(circle,rgba(255,255,255,0.35) 1px,transparent 1px);
  background-size:10px 10px;pointer-events:none;z-index:0;
}

.top-banner{
  position:relative;z-index:2;background:#F5E070;
  border-radius:12px 12px 0 0;border:4px solid #555;border-bottom:none;
  padding:10px 14px 8px;display:flex;align-items:center;justify-content:center;gap:10px;
  box-shadow:inset 0 4px 0 rgba(255,255,255,0.6);
}
.bstar{font-size:18px;display:inline-block;animation:bPop 0.9s ease-in-out infinite alternate;}
.bstar:nth-child(2){animation-delay:0.2s;}
.bstar:nth-child(4){animation-delay:0.35s;}
.bstar:nth-child(5){animation-delay:0.15s;}
@keyframes bPop{from{transform:scale(1) rotate(-10deg)}to{transform:scale(1.3) rotate(10deg)}}
.btxt{font-size:clamp(9px,3vw,14px);color:#444;letter-spacing:2px;}

.stripe{position:relative;z-index:2;height:10px;background:repeating-linear-gradient(90deg,#555 0,#555 10px,#FFF0A0 10px,#FFF0A0 20px);border-left:4px solid #555;border-right:4px solid #555;}
.stripe2{position:relative;z-index:2;height:10px;background:repeating-linear-gradient(90deg,#FFF0A0 0,#FFF0A0 10px,#555 10px,#555 20px);border-left:5px solid #555;border-right:5px solid #555;}

.bezel{position:relative;z-index:2;background:#F5E070;border-left:5px solid #555;border-right:5px solid #555;padding:8px;}
.screen-wrap{border:5px solid #555;border-radius:8px;overflow:hidden;position:relative;min-height:300px;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 0 0 3px #1565C0;}
.screen-inner{
  width:100%;min-height:300px;
  background:#1565C0;
  background-image:radial-gradient(circle,rgba(255,255,255,0.18) 1px,transparent 1px),linear-gradient(180deg,#1976D2 0%,#1565C0 50%,#0D47A1 100%);
  background-size:14px 14px,100% 100%;
  display:flex;align-items:center;justify-content:center;position:relative;
}
.scanline{position:absolute;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.12) 3px,rgba(0,0,0,0.12) 4px);pointer-events:none;z-index:10;}
.sparkles{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;}
.sp{position:absolute;animation:spF linear infinite;}
@keyframes spF{0%{opacity:0;transform:scale(0.4)}40%{opacity:1}100%{opacity:0;transform:scale(1.6) translateY(-50px)}}

.panel{
  position:relative;z-index:2;background:#F5E070;
  border:5px solid #555;border-top:none;border-radius:0 0 16px 16px;
  padding:14px 14px 18px;display:flex;align-items:center;justify-content:center;gap:12px;
  box-shadow:inset 0 4px 0 rgba(255,255,255,0.4);
}
.pdeco{width:38px;height:38px;background:#FFF0A0;border:3px solid #555;border-radius:50%;box-shadow:0 4px 0 #555,inset 0 2px 0 rgba(255,255,255,0.6);flex-shrink:0;position:relative;}
.pdeco::after{content:'★';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:14px;color:#666;}
.pbwrap{flex:1;display:flex;justify-content:center;}

.arcade-press{
  font-family:'Press Start 2P',monospace;font-size:clamp(7px,2vw,9px);color:#fff;
  background:linear-gradient(180deg,#1976D2 0%,#1565C0 45%,#0D47A1 50%,#1565C0 100%);
  border:3px solid #555;border-radius:8px;padding:14px 24px;cursor:pointer;
  box-shadow:0 6px 0 #0D47A1,0 8px 0 rgba(0,0,0,0.3),inset 0 3px 0 rgba(255,255,255,0.3);
  animation:abGlow 1.2s ease-in-out infinite alternate;
  transition:transform 0.08s,box-shadow 0.08s;
  text-shadow:1px 1px 0 #0a3570;letter-spacing:0.04em;min-width:160px;line-height:1.9;
}
@keyframes abGlow{
  from{box-shadow:0 6px 0 #0D47A1,0 8px 0 rgba(0,0,0,0.3),inset 0 3px 0 rgba(255,255,255,0.3);}
  to{box-shadow:0 6px 0 #0D47A1,0 8px 0 rgba(0,0,0,0.3),inset 0 3px 0 rgba(255,255,255,0.3),0 0 20px rgba(25,118,210,0.7),0 0 40px rgba(25,118,210,0.3);}
}
.arcade-press:active{transform:translateY(6px);box-shadow:0 0px 0 #0D47A1,inset 0 3px 0 rgba(255,255,255,0.2);animation:none;}
.btn-hint{display:block;font-size:clamp(4px,1.1vw,5px);opacity:0.75;margin-top:5px;font-family:'Press Start 2P',monospace;color:#bbdefb;}

.scr{display:none;flex-direction:column;align-items:center;text-align:center;position:relative;z-index:5;width:100%;padding:1.2rem 1rem;}
.scr.on{display:flex;}

.s1-stars{display:flex;gap:6px;justify-content:center;margin-bottom:0.5rem;}
.s1-star{font-size:16px;animation:sWig 0.9s ease-in-out infinite alternate;}
.s1-star:nth-child(2){animation-delay:0.2s;}
.s1-star:nth-child(3){animation-delay:0.4s;}
@keyframes sWig{from{transform:rotate(-15deg) scale(1)}to{transform:rotate(15deg) scale(1.25)}}

.main-title{font-size:clamp(20px,5.5vw,30px);color:#fff;-webkit-text-stroke:3px #FFF0A0;text-shadow:3px 3px 0 #0D47A1,4px 4px 0 rgba(0,0,0,0.3);line-height:1.2;letter-spacing:2px;margin-bottom:0.2rem;}
.main-title .l2{color:#FFF0A0;-webkit-text-stroke:3px #555;display:block;}

.rbar-split{display:flex;width:72%;height:8px;margin:0.5rem auto 1rem;border:2px solid #FFF0A0;border-radius:4px;overflow:hidden;}
.rb-r{flex:1;background:#ff4d6d;animation:rbP 1s ease-in-out infinite alternate;}
.rb-b{flex:1;background:#FFF0A0;animation:rbP 1s ease-in-out infinite alternate 0.5s;}
@keyframes rbP{from{filter:brightness(1)}to{filter:brightness(1.5)}}

.sub-txt{font-size:clamp(5px,1.5vw,6px);color:#fff;line-height:2.4;margin-bottom:1.2rem;text-shadow:1px 1px 0 #0D47A1;}
.insert{font-size:clamp(4px,1.2vw,5px);color:#FFF0A0;margin-top:0.8rem;animation:blk 1s step-end infinite;letter-spacing:0.08em;text-shadow:1px 1px 0 #0D47A1;}
.lives{font-size:clamp(4px,1.2vw,5px);color:#fff;margin-top:0.5rem;text-shadow:1px 1px 0 #0D47A1;}
.lives span{color:#FFF0A0;}
@keyframes blk{0%,100%{opacity:1}50%{opacity:0}}

.s2lbl{font-size:clamp(4px,1.3vw,6px);color:#FFF0A0;margin-bottom:0.8rem;letter-spacing:0.06em;animation:blk 0.6s step-end infinite;text-shadow:1px 1px 0 #0D47A1;}
.stage{width:min(220px,74vw);height:min(165px,55vw);background:#082060;border:4px solid #FFF0A0;border-radius:6px;box-shadow:inset 0 0 16px rgba(25,118,210,0.4),0 0 0 2px #1565C0;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;margin-bottom:0.8rem;}
.sline{position:absolute;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.12) 3px,rgba(0,0,0,0.12) 4px);pointer-events:none;z-index:3;}
.pcard{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;position:absolute;width:100%;height:100%;opacity:0;transform:scale(0.4) rotate(-10deg);transition:opacity 0.14s,transform 0.14s;z-index:2;}
.pcard.vis{opacity:1;transform:scale(1) rotate(0deg);}
.pcard.ex{opacity:0;transform:scale(1.4) rotate(8deg);transition:opacity 0.09s,transform 0.09s;}
.pxc{image-rendering:pixelated;width:64px;height:64px;}
.plbl{font-size:clamp(4px,1.2vw,5px);color:#FFF0A0;line-height:2;text-shadow:1px 1px 0 #0D47A1;}
.prog{display:flex;gap:5px;margin-bottom:0.4rem;}
.pp{width:10px;height:10px;background:#082060;border:2px solid #1565C0;border-radius:2px;}
.pp.on{background:#FFF0A0;border-color:#F5E070;}
.pp.bl{animation:ppB 0.25s step-end infinite;}
@keyframes ppB{0%,100%{background:#FFF0A0}50%{background:#fff}}
.s2msg{font-size:clamp(4px,1.1vw,5px);color:#fff;min-height:12px;margin-top:0.3rem;letter-spacing:0.04em;text-shadow:1px 1px 0 #0D47A1;}

.panel-s2{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;}
.p-arrow{width:42px;height:42px;background:linear-gradient(180deg,#1976D2,#1565C0 45%,#0D47A1 50%,#1565C0 100%);border:3px solid #555;border-radius:8px;box-shadow:0 4px 0 #0D47A1,inset 0 2px 0 rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;font-size:16px;color:#FFF0A0;cursor:default;flex-shrink:0;animation:arrP 1.5s ease-in-out infinite alternate;}
@keyframes arrP{from{box-shadow:0 4px 0 #0D47A1;}to{box-shadow:0 4px 0 #0D47A1,0 0 14px rgba(25,118,210,0.6);}}

.crain{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;overflow:hidden;}
.cr{position:absolute;animation:crF linear forwards;}
@keyframes crF{0%{opacity:1;transform:translateY(-10px) rotate(0)}100%{opacity:0;transform:translateY(500px) rotate(360deg)}}

.rhdr{font-size:clamp(10px,3vw,14px);color:#FFF0A0;-webkit-text-stroke:2px #0D47A1;text-shadow:2px 2px 0 #0D47A1;margin-bottom:0.6rem;animation:blk 1.4s step-end infinite;letter-spacing:2px;}
.rart{image-rendering:pixelated;width:72px;height:72px;display:block;margin:0 auto 0.6rem;animation:wB 0.4s steps(2) infinite;}
@keyframes wB{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.rname{font-size:clamp(7px,2vw,9px);color:#fff;-webkit-text-stroke:1px #0D47A1;text-shadow:2px 2px 0 #0D47A1;margin-bottom:0.4rem;line-height:1.8;}
.rdesc{font-size:clamp(4px,1.1vw,5px);color:#fff;line-height:2.4;margin-bottom:0.8rem;white-space:pre-line;text-shadow:1px 1px 0 #0D47A1;}
.clbl{font-size:clamp(4px,1.1vw,5px);color:#FFF0A0;margin-bottom:0.4rem;text-shadow:1px 1px 0 #0D47A1;}
.ccode{font-family:'Press Start 2P',monospace;font-size:clamp(8px,2.2vw,11px);color:#555;background:#FFF0A0;border:3px solid #555;border-radius:6px;padding:8px 16px;display:inline-block;box-shadow:0 4px 0 #555,inset 0 2px 0 rgba(255,255,255,0.6);letter-spacing:0.1em;margin-bottom:0.8rem;}
.nop{font-size:clamp(4px,1.2vw,5px);color:#FFF0A0;line-height:2.5;margin-bottom:0.8rem;text-shadow:1px 1px 0 #0D47A1;}
.rscore{font-size:clamp(4px,1.1vw,5px);color:#FFF0A0;margin-top:0.5rem;letter-spacing:0.04em;text-shadow:1px 1px 0 #0D47A1;}
.rscore span{color:#fff;}
.again-lnk{font-size:clamp(4px,1vw,5px);color:#bbdefb;margin-top:0.5rem;cursor:pointer;background:none;border:none;font-family:'Press Start 2P',monospace;letter-spacing:0.04em;text-decoration:underline;}
.panel-claim{font-family:'Press Start 2P',monospace;font-size:clamp(5px,1.5vw,7px);color:#fff;background:linear-gradient(180deg,#1976D2,#1565C0 45%,#0D47A1 50%,#1565C0 100%);border:3px solid #555;border-radius:8px;padding:12px 20px;cursor:pointer;min-width:150px;box-shadow:0 5px 0 #0D47A1,inset 0 2px 0 rgba(255,255,255,0.25);transition:transform 0.08s,box-shadow 0.08s;letter-spacing:0.04em;text-shadow:1px 1px 0 #0a3570;}
.panel-claim:active{transform:translateY(4px);box-shadow:0 1px 0 #0D47A1;}
</style>
</head>
<body>

<div class="machine">
<div class="frame-outer">
  <div class="top-banner">
    <span class="bstar">⭐</span><span class="bstar">★</span>
    <span class="btxt">PRIZE MACHINE</span>
    <span class="bstar">★</span><span class="bstar">⭐</span>
  </div>
  <div class="stripe"></div>
  <div class="bezel">
    <div class="screen-wrap">
      <div class="screen-inner">
        <div class="scanline"></div>
        <div class="sparkles" id="sparkles"></div>

        <div class="scr on" id="s1">
          <div class="s1-stars">
            <span class="s1-star">⭐</span><span class="s1-star">✨</span>
            <span class="s1-star">🌟</span><span class="s1-star">✨</span>
            <span class="s1-star">⭐</span>
          </div>
          <div class="main-title">PRESS<br><span class="l2">START!</span></div>
          <div class="rbar-split"><div class="rb-r"></div><div class="rb-b"></div></div>
          <p class="sub-txt">GRACIAS POR TU COMPRA!<br>TIENES UN PREMIO SECRETO.<br>PRESIONA EL BOTON!</p>
          <p class="insert">✦ INSERT COIN ✦</p>
          <p class="lives">PLAYER 1 &nbsp;<span>♥ ♥ ♥</span></p>
        </div>

        <div class="scr" id="s2">
          <p class="s2lbl">✦ CARGANDO TU PREMIO... ✦</p>
          <div class="stage">
            <div class="sline"></div>
            <div class="pcard" id="pcard">
              <canvas class="pxc" id="pxc" width="64" height="64"></canvas>
              <span class="plbl" id="plbl"></span>
            </div>
          </div>
          <div class="prog" id="prog"></div>
          <p class="s2msg" id="s2msg"></p>
        </div>

        <div class="scr" id="s3" style="position:relative">
          <div class="crain" id="crain"></div>
          <p class="rhdr" id="rhdr">★ YOU WIN! ★</p>
          <canvas class="rart" id="rc" width="64" height="64"></canvas>
          <p class="rname" id="rname"></p>
          <p class="rdesc" id="rdesc"></p>
          <div id="cwrap" style="display:none">
            <p class="clbl">✦ TU CODIGO DE DESCUENTO ✦</p>
            <div class="ccode" id="rcode"></div>
          </div>
          <p class="nop" id="nop" style="display:none">★ GAME OVER ★<br><br>SIGUE COMPRANDO!</p>
          <p class="rscore">SCORE: <span id="rscore">00000</span></p>
          <button class="again-lnk" id="againBtn">↩ JUGAR DE NUEVO</button>
        </div>
      </div>
    </div>
  </div>
  <div class="stripe2"></div>
  <div class="panel" id="panel">
    <div class="pdeco"></div>
    <div class="pbwrap" id="panelBtns"></div>
    <div class="pdeco"></div>
  </div>
</div>
</div>

<script>
(function(){

  /* ══════════════════════════════════════════
     CONFIGURACION DE PREMIOS
     ══════════════════════════════════════════
     name:  Nombre del premio
     desc:  Descripcion (usa \n para salto de linea)
     code:  Codigo de descuento en Shopify (null = sin premio)
     color: Color del pixel art [R, G, B]
     prob:  Probabilidad (mayor numero = sale mas seguido)
  */
  var PRIZES = [
    { name:"COMPRA GRATIS!",  desc:"TU PEDIDO COMPLETO\nVA POR LA CASA.",      code:"GRATIS100", color:[255,220,0],   prob:2  },
    { name:"50% DESCUENTO",   desc:"LA MITAD DEL PRECIO,\nTODA LA ALEGRIA.",   code:"MITAD50",   color:[100,160,255], prob:5  },
    { name:"30% DESCUENTO",   desc:"UN BUEN DESCUENTO\nEN TU PEDIDO.",          code:"PROMO30",   color:[200,100,220], prob:10 },
    { name:"20% DESCUENTO",   desc:"AHORRA UN 20%\nEN TU COMPRA.",              code:"SAVE20",    color:[255,100,130], prob:13 },
    { name:"ENVIO GRATIS",    desc:"TU PAQUETE LLEGA\nSIN COSTO EXTRA.",        code:"SHIP0",     color:[60,200,120],  prob:18 },
    { name:"10% DESCUENTO",   desc:"DESCUENTO PARA\nTU PROXIMO PEDIDO.",        code:"DESC10",    color:[255,160,50],  prob:20 },
    { name:"CREDITO DE $5",   desc:"CREDITO DIRECTO\nEN TU CARRITO.",           code:"CRED5",     color:[50,190,210],  prob:15 },
    { name:"MEJOR SUERTE!",   desc:null,                                         code:null,        color:[160,160,160], prob:17 }
  ];
  /* ══════════════════════════════════════════ */

  var POOL=["COMPRA GRATIS!","50% OFF","30% OFF","20% OFF","ENVIO FREE","CREDITO","PREMIO VIP","SORPRESA","SUPER PRIZE","MEGA WIN","GIFT CARD","BONUS!"];
  var MSGS=["CALCULANDO...","PROCESANDO...","CASI CASI...","UN MOMENTO...","AQUI VAMOS...","SE VE BIEN!","SORPRESA!","REVELANDO..."];
  var DELAYS=[230,245,265,295,335,415,525,695,930,1200];

  function pick(){var tot=PRIZES.reduce(function(s,p){return s+p.prob;},0),r=Math.random()*tot,c=0;for(var i=0;i<PRIZES.length;i++){c+=PRIZES[i].prob;if(r<=c)return PRIZES[i];}return PRIZES[PRIZES.length-1];}
  function goTo(id){['s1','s2','s3'].forEach(function(s){document.getElementById(s).classList.remove('on');});document.getElementById(id).classList.add('on');}

  function setPanelBtn(mode,prize){
    var wrap=document.getElementById('panelBtns');
    if(mode==='start'){
      wrap.innerHTML='<button class="arcade-press" id="startBtn">★ PRESIONAME ★<span class="btn-hint">TOCA PARA DESCUBRIR TU PREMIO</span></button>';
      document.getElementById('startBtn').addEventListener('click',function(){var p=pick();goTo('s2');setPanelBtn('arrows');runAnim(p);});
    }else if(mode==='arrows'){
      wrap.innerHTML='<div class="panel-s2"><div class="p-arrow">◀</div><div class="p-arrow">▶</div></div>';
    }else if(mode==='claim'){
      if(prize&&prize.code){
        wrap.innerHTML='<button class="panel-claim" id="claimBtn">[ COPIAR CODIGO ]</button>';
        document.getElementById('claimBtn').addEventListener('click',function(){
          var code=document.getElementById('rcode').textContent,btn=document.getElementById('claimBtn');
          if(navigator.clipboard){navigator.clipboard.writeText(code).then(function(){btn.textContent='[ ✓ COPIADO! ]';setTimeout(function(){btn.textContent='[ COPIAR CODIGO ]';},2500);});}
          else{var el=document.createElement('textarea');el.value=code;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);btn.textContent='[ ✓ COPIADO! ]';setTimeout(function(){btn.textContent='[ COPIAR CODIGO ]';},2500);}
        });
      }else{
        wrap.innerHTML='<button class="panel-claim" id="claimBtn">[ JUGAR DE NUEVO ]</button>';
        document.getElementById('claimBtn').addEventListener('click',reset);
      }
    }
  }

  function drawPx(canvas,col,v){
    var ctx=canvas.getContext('2d'),r=col[0],g=col[1],b=col[2];
    var dk='rgb('+Math.max(0,r-70)+','+Math.max(0,g-70)+','+Math.max(0,b-70)+')';
    var lt='rgb('+Math.min(255,r+70)+','+Math.min(255,g+70)+','+Math.min(255,b+70)+')';
    var mn='rgb('+r+','+g+','+b+')';
    ctx.clearRect(0,0,64,64);v=v%4;
    if(v===0){
      var m=[[1,1],[2,1],[3,1],[4,1],[5,1],[0,2],[1,2],[2,2],[3,2],[4,2],[5,2],[6,2],[0,3],[1,3],[2,3],[3,3],[4,3],[5,3],[6,3],[0,4],[1,4],[2,4],[3,4],[4,4],[5,4],[6,4],[0,5],[1,5],[2,5],[3,5],[4,5],[5,5],[6,5],[1,6],[2,6],[3,6],[4,6],[5,6]];
      ctx.fillStyle=mn;m.forEach(function(p){ctx.fillRect(p[0]*8,p[1]*8,8,8);});
      ctx.fillStyle=dk;[[1,3],[2,3],[3,3],[4,3],[5,3]].forEach(function(p){ctx.fillRect(p[0]*8,p[1]*8,8,8);});
      ctx.fillStyle='#fff';[[1,2],[2,2]].forEach(function(p){ctx.fillRect(p[0]*8,p[1]*8,6,6);});
    }else if(v===1){
      ctx.fillStyle=mn;[[3,0],[3,1],[2,1],[4,1],[1,2],[2,2],[3,2],[4,2],[5,2],[0,3],[1,3],[2,3],[3,3],[4,3],[5,3],[6,3],[0,4],[1,4],[2,4],[3,4],[4,4],[5,4],[6,4],[1,5],[2,5],[3,5],[4,5],[5,5],[2,6],[3,6],[4,6],[3,7]].forEach(function(p){ctx.fillRect(p[0]*8,p[1]*8,8,8);});
      ctx.fillStyle=lt;[[3,0],[3,1]].forEach(function(p){ctx.fillRect(p[0]*8,p[1]*8,4,4);});
    }else if(v===2){
      ctx.fillStyle='#FFF0A0';[[2,1],[3,1],[4,1],[1,2],[2,2],[3,2],[4,2],[5,2],[1,3],[2,3],[3,3],[4,3],[5,3],[1,4],[2,4],[3,4],[4,4],[5,4],[1,5],[2,5],[3,5],[4,5],[5,5],[2,6],[3,6],[4,6]].forEach(function(p){ctx.fillRect(p[0]*8,p[1]*8,8,8);});
      ctx.fillStyle='#0D47A1';[[3,2],[3,3],[3,4]].forEach(function(p){ctx.fillRect(p[0]*8,p[1]*8,8,8);});
    }else{
      ctx.fillStyle=mn;[[1,1],[2,1],[3,1],[4,1],[5,1],[1,2],[5,2],[1,3],[5,3],[1,4],[2,4],[3,4],[4,4],[5,4],[2,5],[3,5],[4,5],[3,6]].forEach(function(p){ctx.fillRect(p[0]*8,p[1]*8,8,8);});
      ctx.fillStyle='#FFF0A0';[[3,5],[3,6]].forEach(function(p){ctx.fillRect(p[0]*8,p[1]*8,8,8);});
      ctx.fillStyle=lt;[[1,1],[2,1]].forEach(function(p){ctx.fillRect(p[0]*8,p[1]*8,5,5);});
    }
  }

  function buildBar(n){var b=document.getElementById('prog');b.innerHTML='';for(var i=0;i<n;i++){var d=document.createElement('div');d.className='pp';b.appendChild(d);}}
  function setBar(i){document.querySelectorAll('.pp').forEach(function(d,idx){d.classList.remove('on','bl');if(idx<i)d.classList.add('on');if(idx===i)d.classList.add('bl');});}

  function launchCoins(won){
    var w=document.getElementById('crain');w.innerHTML='';if(!won)return;
    var items=['⭐','✨','🌟','💫','★','🌸'];
    for(var i=0;i<26;i++){
      var c=document.createElement('div');c.className='cr';
      c.textContent=items[Math.floor(Math.random()*items.length)];
      c.style.left=Math.random()*92+'%';c.style.fontSize=(10+Math.random()*14)+'px';
      c.style.animationDuration=(1.2+Math.random()*2)+'s';c.style.animationDelay=(Math.random()*1.2)+'s';
      w.appendChild(c);
    }
  }

  function makeSparkles(){
    var w=document.getElementById('sparkles');w.innerHTML='';
    var items=['✦','✧','★','·','·','✦'];
    for(var i=0;i<20;i++){
      var s=document.createElement('div');s.className='sp';
      s.textContent=items[Math.floor(Math.random()*items.length)];
      s.style.left=Math.random()*95+'%';s.style.top=(5+Math.random()*85)+'%';
      s.style.fontSize=(7+Math.random()*12)+'px';
      s.style.color='rgba(255,255,255,'+(0.2+Math.random()*0.5)+')';
      s.style.animationDuration=(2+Math.random()*3)+'s';s.style.animationDelay=(Math.random()*3)+'s';
      w.appendChild(s);
    }
  }

  function runAnim(prize){
    var steps=10;buildBar(steps);
    var canvas=document.getElementById('pxc'),card=document.getElementById('pcard'),lbl=document.getElementById('plbl');
    var seq=[];var step=0;
    for(var i=0;i<steps-1;i++){var rp=PRIZES[Math.floor(Math.random()*PRIZES.length)];seq.push({label:POOL[Math.floor(Math.random()*POOL.length)],v:Math.floor(Math.random()*4),color:rp.color});}
    seq.push({label:prize.name,v:Math.floor(Math.random()*4),color:prize.color});
    function show(item){card.classList.remove('vis','ex');setTimeout(function(){drawPx(canvas,item.color,item.v);lbl.textContent=item.label;card.classList.add('vis');},80);}
    function next(){
      if(step>=steps){setTimeout(function(){result(prize);},500);return;}
      setBar(step);document.getElementById('s2msg').textContent=MSGS[Math.min(step,MSGS.length-1)];
      if(step>0){card.classList.add('ex');setTimeout(function(){card.classList.remove('ex');show(seq[step]);},100);}else show(seq[0]);
      setTimeout(next,DELAYS[step]);step++;
    }
    next();
  }

  function result(prize){
    goTo('s3');
    var rc=document.getElementById('rc');drawPx(rc,prize.color,Math.floor(Math.random()*4));
    document.getElementById('rname').textContent=prize.name;
    document.getElementById('rdesc').textContent=prize.desc||'';
    var won=!!prize.code;
    var hdr=document.getElementById('rhdr');
    hdr.textContent=won?'★ YOU WIN! ★':'✦ GAME OVER ✦';
    hdr.style.color=won?'#FFF0A0':'#ff8fab';
    document.getElementById('cwrap').style.display=won?'block':'none';
    document.getElementById('nop').style.display=won?'none':'block';
    document.getElementById('rdesc').style.display=won?'block':'none';
    if(prize.code)document.getElementById('rcode').textContent=prize.code;
    document.getElementById('rscore').textContent=String(Math.floor(Math.random()*90000)+10000);
    launchCoins(won);setPanelBtn('claim',prize);
  }

  function reset(){document.getElementById('crain').innerHTML='';goTo('s1');setPanelBtn('start');}
  makeSparkles();setPanelBtn('start');
  document.getElementById('againBtn').addEventListener('click',reset);
})();
</script>
</body>
</html>
